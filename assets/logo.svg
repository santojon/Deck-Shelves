        </g>
        <g id="circle">
            <!-- simplified perfect circle approximating previous geometry -->
            <circle id="deck-circle" cx="300" cy="620" r="80" class="steam-blue steam-stroke-dark"/>
        </g>
    </g>
    <g id="shelves-icon">
        <g id="books">
