name: "[BUG] Bug Report"
description: Something is broken or behaving unexpectedly
title: "[BUG] "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        **Before submitting:** check if a similar issue already exists.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: Describe the bug...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open QAM
        2. Go to...
        3. See error
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Plugin version
      placeholder: "e.g. 1.5.0"
    validations:
      required: true

  - type: input
    id: steamos
    attributes:
      label: SteamOS version
      placeholder: "e.g. 3.6.20"
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Logs, screenshots, or anything else useful.
    validations:
      required: false
