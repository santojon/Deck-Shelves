name: "[BUG] Bug Report"
description: Something is broken or behaving unexpectedly
title: "[BUG] "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        **Before submitting:** check if a similar issue already exists.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: Describe the bug...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open QAM
        2. Go to...
        3. See error
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Plugin version
      placeholder: "e.g. 1.6.3"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      description: Which OS are you running?
      options:
        - SteamOS (Steam Deck)
        - Bazzite
        - HoloISO
        - ChimeraOS
        - Other Linux
        - Windows
        - macOS
        - Other / Unknown
    validations:
      required: true

  - type: input
    id: os_version
    attributes:
      label: OS version
      description: Output of `cat /etc/os-release` (Linux) or "Settings → System" version. For SteamOS use the build number.
      placeholder: "e.g. SteamOS 3.7.21, Bazzite 41, Windows 11 23H2"
    validations:
      required: true

  - type: input
    id: steam_client
    attributes:
      label: Steam client version
      description: Steam → top-left menu → Steam → "Check for Steam Client Updates..." (or "About Steam"). Look for the build date / version.
      placeholder: "e.g. 1748993579 (Stable, Apr 21 2026)"
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Logs, screenshots, or anything else useful.
    validations:
      required: false
