name: "[BUG] Bug Report"
description: Something is broken or behaving unexpectedly
title: "[BUG] "
labels: ["type::bug"]
body:
  - type: markdown
    attributes:
      value: |
        **Before submitting:** check if a similar issue already exists.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
      placeholder: Describe the bug...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open QAM
        2. Go to...
        3. See error
    validations:
      required: true

  - type: dropdown
    id: version
    attributes:
      label: Plugin version
      description: Shown in the Deck Shelves QAM panel / settings footer. Pick "Other / not listed" if yours isn't here.
      options:
        # BEGIN auto-versions (regenerated by .github/workflows/version-dropdown.yml on each release)
        - 3.0.2
        - 3.0.2-beta.2
        - 3.0.2-beta.1
        - 3.0.1
        - 3.0.0
        - 2.4.3
        - 2.4.2
        - 2.4.1
        - 2.4.0
        - 2.3.2
        # END auto-versions
        - Other / not listed
    validations:
      required: true

  - type: input
    id: version_other
    attributes:
      label: Plugin version (if "Other / not listed")
      description: Fill this in only if you picked "Other / not listed" above — your exact version, shown in the Deck Shelves QAM panel / settings footer.
      placeholder: "e.g. 2.0.0"
    validations:
      required: false

  - type: dropdown
    id: release_channel
    attributes:
      label: Release channel
      description: Are you on a stable release or a beta/pre-release?
      options:
        - Stable
        - Beta / Pre-release
        - Unknown
    validations:
      required: true

  - type: dropdown
    id: steam_mode
    attributes:
      label: Steam UI mode
      description: Which UI mode were you using when the bug occurred? (Deck Shelves does not support Desktop Mode)
      options:
        - Game Mode (Steam Deck home / GamepadUI)
        - Big Picture Mode
        - Both / Not sure
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      description: Which OS are you running?
      options:
        - SteamOS (Steam Deck)
        - Bazzite
        - HoloISO
        - ChimeraOS
        - Other Linux
        - Windows
        - macOS
        - Other / Unknown
    validations:
      required: true

  - type: input
    id: os_version
    attributes:
      label: OS version
      description: Output of `cat /etc/os-release` (Linux) or "Settings → System" version. For SteamOS use the build number.
      placeholder: "e.g. SteamOS 3.7.21, Bazzite 41, Windows 11 23H2"
    validations:
      required: true

  - type: input
    id: steam_client
    attributes:
      label: Steam client version
      description: Steam → top-left menu → Steam → "Check for Steam Client Updates..." (or "About Steam"). Look for the build date / version.
      placeholder: "e.g. 1748993579 (Stable, Apr 21 2026)"
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Logs, screenshots, or anything else useful.
    validations:
      required: false
