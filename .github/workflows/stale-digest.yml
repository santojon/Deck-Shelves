name: Stale Triage Digest

# Phase 1 — READ-ONLY. This workflow never labels, comments on, or closes
# any reported issue. It only builds a weekly digest of what the tiered
# stale policy *would* catch and publishes it to a single pinned tracking
# issue ("🧹 Stale triage digest") so the policy can be observed before any
# automation is switched on. Sibling to the Monday weekly CI report.

on:
  workflow_dispatch:
  schedule:
    - cron: '30 7 * * 1'  # Every Monday at 07:30 UTC (between weekly-report 07:00 and enforce 08:00)

permissions:
  issues: write
  contents: read

concurrency:
  group: stale-digest
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - name: Build and publish the read-only stale digest
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const MARKER = "<!-- stale-triage-digest -->";
            const TITLE = "🧹 Stale triage digest";

            // Tiered thresholds (days), from the agreed policy.
            const T = {
              awaitingWarn: 21, awaitingClose: 35,   // Bucket 1: needs-info (gentle)
              untriagedWarn: 30, untriagedClose: 60, // Bucket 2: untriaged idle (option b)
              confirmedStale: 60,                     // Bucket 3: confirmed/accepted (label-only)
              churnAgeDays: 90, churnComments: 15,    // Bucket 4: won't-converge
            };

            const now = Date.now();
            const days = (iso) => Math.floor((now - new Date(iso).getTime()) / 86400000);
            const name = (l) => (typeof l === "string" ? l : l.name);
            const has = (i, n) => i.labels.some((l) => name(l) === n);
            const hasPrefix = (i, p) => i.labels.some((l) => name(l).startsWith(p));
            const isExempt = (i) =>
              has(i, "keep-open") ||
              has(i, "priority::critical") ||
              has(i, "priority::high") ||
              (i.assignees && i.assignees.length > 0) ||
              !!i.milestone;

            // All open issues (PRs excluded). Small repo — one paginated pass.
            const all = await github.paginate(github.rest.issues.listForRepo, {
              owner, repo, state: "open", per_page: 100,
            });
            const issues = all.filter((i) => !i.pull_request);

            // The digest tracking issue is identified by its hidden marker.
            const tracking = issues.find((i) => (i.body || "").includes(MARKER));
            const candidates = issues.filter((i) => i !== tracking && !isExempt(i));

            const b1 = [], b2 = [], b3 = [], b4 = [];
            for (const i of candidates) {
              const idle = days(i.updated_at);
              const age = days(i.created_at);
              const needsInfo = has(i, "needs-info");
              const triaged = hasPrefix(i, "type::") || hasPrefix(i, "priority::");

              if (needsInfo && idle >= T.awaitingWarn) b1.push({ i, idle, age });
              else if (!needsInfo && !triaged && idle >= T.untriagedWarn) b2.push({ i, idle, age });
              else if (!needsInfo && triaged && idle >= T.confirmedStale) b3.push({ i, idle, age });

              if (age >= T.churnAgeDays && i.comments >= T.churnComments) b4.push({ i, idle, age });
            }

            const labelsOf = (i) => i.labels.map(name).filter((n) => n !== "stale").join(", ") || "—";
            const link = (i) => `[#${i.number}](${i.html_url}) ${i.title.replace(/\|/g, "\\|")}`;

            const section = (title, note, rows, render) => {
              const lines = [`### ${title}`, "", `_${note}_`, ""];
              if (rows.length === 0) { lines.push("Nothing this week. ✅", ""); return lines.join("\n"); }
              lines.push(...render(rows), "");
              return lines.join("\n");
            };

            const body = [
              MARKER,
              `# ${TITLE}`,
              "",
              "> **Phase 1 — read-only preview.** No labels, comments, or closes are applied to reported issues. " +
              "This is what the tiered stale policy *would* act on. Add the `keep-open` label to any issue to exempt it permanently.",
              "",
              `_Last updated: ${new Date().toISOString().slice(0, 16).replace("T", " ")} UTC · ` +
              `${candidates.length} open issue(s) evaluated (exemptions: keep-open, priority::critical/high, assigned, milestoned)._`,
              "",
              section(
                "1 · Awaiting reporter (`needs-info`)",
                `Would warn at ${T.awaitingWarn}d idle, close at ${T.awaitingClose}d.`,
                b1,
                (rows) => [
                  "| Issue | Idle (d) | Status |", "|---|---|---|",
                  ...rows.sort((a, b) => b.idle - a.idle).map(({ i, idle }) =>
                    `| ${link(i)} | ${idle} | ${idle >= T.awaitingClose ? "⚠️ would close" : "would warn"} |`),
                ],
              ),
              section(
                "2 · Untriaged & idle (no `type::` / `priority::`)",
                `Would warn at ${T.untriagedWarn}d idle, close at ${T.untriagedClose}d.`,
                b2,
                (rows) => [
                  "| Issue | Idle (d) | Status |", "|---|---|---|",
                  ...rows.sort((a, b) => b.idle - a.idle).map(({ i, idle }) =>
                    `| ${link(i)} | ${idle} | ${idle >= T.untriagedClose ? "⚠️ would close" : "would warn"} |`),
                ],
              ),
              section(
                "3 · Confirmed / accepted — label-only, never closed",
                `Would get the \`stale\` label after ${T.confirmedStale}d idle. Surfaces for manual review.`,
                b3,
                (rows) => [
                  "| Issue | Idle (d) | Labels |", "|---|---|---|",
                  ...rows.sort((a, b) => b.idle - a.idle).map(({ i, idle }) =>
                    `| ${link(i)} | ${idle} | ${labelsOf(i)} |`),
                ],
              ),
              section(
                "4 · Won't-converge — needs a decision, never closed",
                `Open ≥ ${T.churnAgeDays}d with ≥ ${T.churnComments} comments. Consider \`needs-decision\` or converting to a Discussion.`,
                b4,
                (rows) => [
                  "| Issue | Age (d) | Comments |", "|---|---|---|",
                  ...rows.sort((a, b) => b.i.comments - a.i.comments).map(({ i, age }) =>
                    `| ${link(i)} | ${age} | ${i.comments} |`),
                ],
              ),
            ].join("\n");

            if (tracking) {
              await github.rest.issues.update({ owner, repo, issue_number: tracking.number, body });
              core.info(`Updated digest issue #${tracking.number}`);
            } else {
              const created = await github.rest.issues.create({ owner, repo, title: TITLE, body, labels: ["keep-open"] });
              core.info(`Created digest issue #${created.data.number}`);
            }

            core.summary
              .addRaw(`Stale digest: ${b1.length} awaiting-reporter, ${b2.length} untriaged, ${b3.length} confirmed, ${b4.length} won't-converge.`)
              .write();
