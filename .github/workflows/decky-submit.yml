name: Decky Store Submission

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      database_fork:
        description: 'Override database fork (default: vars.DECKY_DATABASE_FORK)'
        required: false
        type: string

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  prepare-submission:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.ref_name == github.event.repository.default_branch || startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: meta
        run: |
          VERSION=$(node -p "require('./package.json').version")
          PLUGIN_NAME=$(node -p "require('./plugin.json').name")
          PLUGIN_AUTHOR=$(node -p "require('./plugin.json').author")
          PLUGIN_DESC=$(node -p "require('./plugin.json').publish.description")
          COMMIT=$(git rev-parse HEAD)
          {
            printf 'version=%s\n' "$VERSION"
            printf 'plugin_name=%s\n' "$PLUGIN_NAME"
            printf 'plugin_author=%s\n' "$PLUGIN_AUTHOR"
            printf 'commit=%s\n' "$COMMIT"
          } >> "$GITHUB_OUTPUT"
          echo "Plugin: $PLUGIN_NAME v$VERSION ($COMMIT)"

          # Extract changelog for this version
          CHANGELOG=""
          if [[ -f "CHANGELOG.md" ]]; then
            CHANGELOG=$(awk "/^## \\[${VERSION}\\]/{found=1; next} /^## \\[/{if(found) exit} found{print}" CHANGELOG.md | sed '/^$/N;/^\n$/d' | sed -e 's/^[[:space:]]*//' -e '/^$/d')
          fi
          if [[ -z "$CHANGELOG" ]]; then
            CHANGELOG="Version ${VERSION} release."
          fi

          # Persist description & changelog to files to avoid embedding raw multi-line
          # data into the job run script (prevents accidental shell evaluation).
          mkdir -p .github/tmp
          printf '%s\n' "$PLUGIN_DESC" > .github/tmp/plugin_description.txt
          printf '%s\n' "$CHANGELOG" > .github/tmp/changelog.txt

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Build and package
        run: |
          pnpm run build:release
          pnpm run dist
          pnpm run verify:package

      - name: Verify release zip
        run: |
          SLUG=$(node -p 'require("./package.json").name')
          ZIP="${SLUG}-v${{ steps.meta.outputs.version }}.zip"
          if [[ ! -f "$ZIP" ]]; then
            echo "❌ Release zip not found: $ZIP"
            exit 1
          fi
          echo "✅ Release zip: $ZIP ($(wc -c < "$ZIP" | tr -d ' ') bytes)"
          unzip -l "$ZIP" | head -30

      - name: Clone database fork & prepare submission
        env:
          GH_TOKEN: ${{ secrets.SUBMIT_TOKEN }}
        run: |
          set -euo pipefail
          PLUGIN="${{ steps.meta.outputs.plugin_name }}"
          PLUGIN_SLUG="${PLUGIN// /-}"
          FORK="${{ inputs.database_fork || vars.DECKY_DATABASE_FORK }}"
          FORK_OWNER="${FORK%%/*}"
          COMMIT="${{ steps.meta.outputs.commit }}"
          VERSION="${{ steps.meta.outputs.version }}"
          AUTHOR="${{ steps.meta.outputs.plugin_author }}"
          # Read description & changelog from files created in the earlier step to
          # avoid embedding raw multi-line content into the generated runner script.
          DESCRIPTION_FILE="${{ github.workspace }}/.github/tmp/plugin_description.txt"
          CHANGELOG_FILE="${{ github.workspace }}/.github/tmp/changelog.txt"
          REPO_URL="https://github.com/${{ github.repository }}"

          if [[ -z "${GH_TOKEN:-}" ]]; then
            echo "❌ SUBMIT_TOKEN secret is not set."
            echo "   Add a Personal Access Token with 'repo' scope as a repository secret named SUBMIT_TOKEN."
            exit 1
          fi

          if [[ -z "${FORK:-}" ]]; then
            echo "❌ DECKY_DATABASE_FORK variable is not set and no override was provided."
            echo "   Add a repository variable named DECKY_DATABASE_FORK (e.g. santojon/decky-plugin-database)."
            exit 1
          fi

          git config --global user.name "${AUTHOR}"
          git config --global user.email "${{ github.actor }}@users.noreply.github.com"

          # ── Detect existing open PR for this plugin (owned by our fork) ──
          EXISTING_PR=$(gh pr list \
            --repo SteamDeckHomebrew/decky-plugin-database \
            --state open \
            --json number,headRefName,headRepositoryOwner \
            --jq ".[] | select(.headRepositoryOwner.login | ascii_downcase == (\"${FORK_OWNER}\" | ascii_downcase)) | select(.headRefName | test(\"${PLUGIN_SLUG}\"; \"i\")) | {number, headRefName} | @base64" 2>/dev/null | head -n1 || true)

          echo "📦 Cloning fork: ${FORK}"
          git clone "https://x-access-token:${GH_TOKEN}@github.com/${FORK}.git" db-fork
          cd db-fork

          git remote add upstream https://github.com/SteamDeckHomebrew/decky-plugin-database.git 2>/dev/null || true
          git fetch upstream main --depth=1

          if [[ -n "$EXISTING_PR" ]]; then
            # ── Update path: reuse existing branch, merge upstream, update submodule ──
            PR_NUMBER=$(echo "$EXISTING_PR" | base64 --decode | jq -r '.number')
            BRANCH=$(echo "$EXISTING_PR" | base64 --decode | jq -r '.headRefName')
            echo "🔍 Found existing PR #${PR_NUMBER} on branch: ${BRANCH}"

            git fetch origin "${BRANCH}"
            git checkout -B "${BRANCH}" "origin/${BRANCH}"

            echo "🔀 Merging upstream/main (keeping upstream, adding ours)..."
            git merge upstream/main --no-edit -X theirs || {
              echo "⚠️ Merge had conflicts; applying -X theirs resolution..."
              git checkout --theirs -- . 2>/dev/null || true
              git add . 2>/dev/null || true
              git commit --no-edit -m "Merge upstream/main into ${BRANCH}" || true
            }

            # Update submodule to new commit
            if [[ -d "plugins/${PLUGIN}" ]]; then
              cd "plugins/${PLUGIN}"
              git fetch origin
              git checkout "${COMMIT}"
              cd ../..
            else
              git submodule add "${REPO_URL}.git" "plugins/${PLUGIN}"
              cd "plugins/${PLUGIN}"
              git checkout "${COMMIT}"
              cd ../..
            fi

            git add .
            git commit -m "Update ${PLUGIN} to v${VERSION}" || echo "No changes to commit"

            echo "🚀 Pushing updated branch ${BRANCH}..."
            git push "https://x-access-token:${GH_TOKEN}@github.com/${FORK}.git" "${BRANCH}" --force
            echo "✅ PR #${PR_NUMBER} updated via branch push."

          else
            # ── Create path: new branch + PR ──
            NEW_BRANCH="submit-${PLUGIN_SLUG}-v${VERSION}"
            echo "📌 No open PR found; creating new branch: ${NEW_BRANCH}"

            git checkout -B "${NEW_BRANCH}" upstream/main

            # Auto-detect: is this an update (plugin previously merged) or new addition?
            MERGED_PR=$(gh pr list \
              --repo SteamDeckHomebrew/decky-plugin-database \
              --state merged \
              --search "${PLUGIN}" \
              --json number,title \
              --jq ".[0].number" 2>/dev/null || true)

            if [[ -n "$MERGED_PR" ]]; then
              IS_UPDATE=true
              echo "🔍 Found merged PR #${MERGED_PR} → this is an UPDATE submission"
            else
              IS_UPDATE=false
              echo "🔍 No merged PR found → this is a NEW plugin submission"
            fi

            # Add submodule
            if [[ -d "plugins/${PLUGIN}" ]]; then
              cd "plugins/${PLUGIN}"
              git fetch origin
              git checkout "${COMMIT}"
              cd ../..
            else
              git submodule add "${REPO_URL}.git" "plugins/${PLUGIN}"
              cd "plugins/${PLUGIN}"
              git checkout "${COMMIT}"
              cd ../..
            fi

            PULLS_URL="https://github.com/SteamDeckHomebrew/decky-plugin-database/pulls?q=is%3Apr+is%3Aopen+sort%3Acreated-desc+-status%3Afailure+-draft%3Atrue+-author%3A%40me"

            # Write checklist to a temp file using printf to avoid YAML/heredoc indentation issues
            mkdir -p .github/tmp
            printf '%s\n' \
              "## Task Checklist" \
              "" \
              "### Developer" \
              "" \
              "- [x] I am the original author or an authorized maintainer of this plugin." \
              "- [x] I have abided by the licenses of the libraries I am utilizing, including attaching license notices where appropriate." \
              "" \
              "### Plugin" \
              "" \
              "- [x] I have verified that my plugin works properly on the Stable and Beta update channels of SteamOS." \
              "- [x] I have verified my plugin is unique or provides more/alternative functionality to a plugin already on the store." \
              "" \
              "### Backend" \
              "" \
              "- **No**: I am using a custom backend other than Python." \
              "- **No**: I am using a tool or software from a 3rd party FOSS project that does not have it's dependencies [statically linked](https://en.wikipedia.org/wiki/Static_library)." \
              "- **No**: I am using a custom binary that has all of it's dependencies statically linked." \
              "" \
              "### Community" \
              "" \
              "- [ ] I have tested and left feedback on two other [pull requests][pulls] for new or updating plugins." \
              "- [ ] I have commented links to my testing report in this PR." \
              "" \
              "## Testing" \
              "" \
              "- [ ] Tested by a third party on SteamOS Stable or Beta update channel." \
            > .github/tmp/checklist.txt
            CHECKLIST_FILE="${{ github.workspace }}/.github/tmp/checklist.txt"

            if [[ "$IS_UPDATE" == "true" ]]; then
              PR_TITLE="Update ${PLUGIN} to v${VERSION}"
              # Write PR body safely: include changelog (may contain backticks) literally
              {
                echo "# Update ${PLUGIN} to v${VERSION}"
                echo ""
              } > ../pr_body.md
              # Append changelog indented by 4 spaces to preserve formatting in the PR body
              if [[ -f "$CHANGELOG_FILE" ]]; then
                sed 's/^/    /' "$CHANGELOG_FILE" >> ../pr_body.md || true
              fi
              {
                echo ""
                cat "$CHECKLIST_FILE" >> ../pr_body.md || true
                echo ""
                echo "[pulls]: ${PULLS_URL}"
              } >> ../pr_body.md
              COMMIT_MSG="Updating ${PLUGIN} to v${VERSION}"
            else
              PR_TITLE="Add ${PLUGIN} to Plugin Store"
              # Write PR body safely: include description (may contain backticks) literally
              {
                echo "# Add ${PLUGIN} to Plugin Store"
                echo ""
              } > ../pr_body.md
              # Append description indented by 4 spaces to preserve formatting in the PR body
              if [[ -f "$DESCRIPTION_FILE" ]]; then
                sed 's/^/    /' "$DESCRIPTION_FILE" >> ../pr_body.md || true
              fi
              {
                echo ""
                cat "$CHECKLIST_FILE" >> ../pr_body.md || true
                echo ""
                echo "[pulls]: ${PULLS_URL}"
              } >> ../pr_body.md
              COMMIT_MSG="Submitting New Plugin ${PLUGIN}"
            fi

            git add .
            git commit -m "${COMMIT_MSG}" || echo "No changes to commit"

            git push -u "https://x-access-token:${GH_TOKEN}@github.com/${FORK}.git" "${NEW_BRANCH}" --force
            gh pr create \
              --repo SteamDeckHomebrew/decky-plugin-database \
              --head "${FORK_OWNER}:${NEW_BRANCH}" \
              --base main \
              --title "${PR_TITLE}" \
              --body-file ../pr_body.md
            echo ""
            echo "✅ Submission PR created successfully!"
          fi
