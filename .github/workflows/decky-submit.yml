name: Decky Store Submission

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      database_fork:
        description: 'Override database fork (default: vars.DECKY_DATABASE_FORK)'
        required: false
        type: string
      is_update:
        description: 'Is this an update to an existing plugin?'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  prepare-submission:
    runs-on: ubuntu-latest
    if: github.ref_name == github.event.repository.default_branch || startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: meta
        run: |
          VERSION=$(node -p "require('./package.json').version")
          PLUGIN_NAME=$(node -p "require('./plugin.json').name")
          PLUGIN_AUTHOR=$(node -p "require('./plugin.json').author")
          PLUGIN_DESC=$(node -p "require('./plugin.json').publish.description")
          COMMIT=$(git rev-parse HEAD)
          cat >> "$GITHUB_OUTPUT" <<GITHUB_EOF
          version=$VERSION
          plugin_name=$PLUGIN_NAME
          plugin_author=$PLUGIN_AUTHOR
          plugin_description=$PLUGIN_DESC
          commit=$COMMIT
          GITHUB_EOF
          echo "Plugin: $PLUGIN_NAME v$VERSION ($COMMIT)"

          # Extract changelog for this version
          CHANGELOG=""
          if [[ -f "CHANGELOG.md" ]]; then
            CHANGELOG=$(awk "/^## \\[${VERSION}\\]/{found=1; next} /^## \\[/{if(found) exit} found{print}" CHANGELOG.md | sed '/^$/N;/^\n$/d' | sed -e 's/^[[:space:]]*//' -e '/^$/d')
          fi
          if [[ -z "$CHANGELOG" ]]; then
            CHANGELOG="Version ${VERSION} release."
          fi
          cat >> "$GITHUB_OUTPUT" <<GITHUB_EOF
          changelog<<CHANGELOG_EOF
          $CHANGELOG
          CHANGELOG_EOF
          GITHUB_EOF

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Run all validations
        run: |
          pnpm run typecheck
          node scripts/build/validate.mjs
          pnpm run dist
          pnpm run verify:package
          bash scripts/build/validate-compat.sh

      - name: Verify release zip
        run: |
          SLUG=$(node -p 'require("./package.json").name')
          ZIP="${SLUG}-v${{ steps.meta.outputs.version }}.zip"
          if [[ ! -f "$ZIP" ]]; then
            echo "❌ Release zip not found: $ZIP"
            exit 1
          fi
          echo "✅ Release zip: $ZIP ($(wc -c < "$ZIP" | tr -d ' ') bytes)"
          unzip -l "$ZIP" | head -30

      - name: Clone database fork & prepare submission
        env:
          GH_TOKEN: ${{ secrets.SUBMIT_TOKEN }}
        run: |
          set -euo pipefail
          PLUGIN="${{ steps.meta.outputs.plugin_name }}"
          PLUGIN_SLUG="${PLUGIN// /-}"
          FORK="${{ inputs.database_fork || vars.DECKY_DATABASE_FORK }}"
          COMMIT="${{ steps.meta.outputs.commit }}"
          VERSION="${{ steps.meta.outputs.version }}"
          IS_UPDATE="${{ inputs.is_update || 'true' }}"
          BRANCH="submit-${PLUGIN_SLUG}-v${VERSION}"

          if [[ -z "${GH_TOKEN:-}" ]]; then
            echo "❌ SUBMIT_TOKEN secret is not set."
            echo "   Add a Personal Access Token with 'repo' scope as a repository secret named SUBMIT_TOKEN."
            exit 1
          fi

          if [[ -z "${FORK:-}" ]]; then
            echo "❌ DECKY_DATABASE_FORK variable is not set and no override was provided."
            echo "   Add a repository variable named DECKY_DATABASE_FORK (e.g. santojon/decky-plugin-database)."
            exit 1
          fi

          AUTHOR="${{ steps.meta.outputs.plugin_author }}"
          DESCRIPTION="${{ steps.meta.outputs.plugin_description }}"
          CHANGELOG=$(cat <<'CHANGELOG_EOF'
          ${{ steps.meta.outputs.changelog }}
          CHANGELOG_EOF
          )
          CHANGELOG="${CHANGELOG/#          /}"
          CHANGELOG="${CHANGELOG//\n          /\n}"
          REPO_URL="https://github.com/${{ github.repository }}"

          git config --global user.name "${AUTHOR}"
          git config --global user.email "${{ github.actor }}@users.noreply.github.com"

          echo "📦 Cloning fork: ${FORK}"
          git clone "https://x-access-token:${GH_TOKEN}@github.com/${FORK}.git" db-fork
          cd db-fork

          git remote add upstream https://github.com/SteamDeckHomebrew/decky-plugin-database.git 2>/dev/null || true
          git fetch upstream main --depth=1

          git checkout -b "${BRANCH}" upstream/main

          PULLS_URL="https://github.com/steamdeckHomebrew/decky-plugin-database/pulls?q=is%3Apr+is%3Aopen+sort%3Acreated-desc+-status%3Afailure+-draft%3Atrue+-author%3A%40me"

          CHECKLIST=$(cat <<'CHECKLIST_EOF'
          ## Task Checklist

          ### Developer

          - [x] I am the original author or an authorized maintainer of this plugin.
          - [x] I have abided by the licenses of the libraries I am utilizing, including attaching license notices where appropriate.

          ### Plugin

          - [x] I have verified that my plugin works properly on the Stable and Beta update channels of SteamOS.
          - [x] I have verified my plugin is unique or provides more/alternative functionality to a plugin already on the store.

          ### Backend

          - **No**: I am using a custom backend other than Python.
          - **No**: I am using a tool or software from a 3rd party FOSS project that does not have it's dependencies [statically linked](https://en.wikipedia.org/wiki/Static_library).
          - **No**: I am using a custom binary that has all of it's dependencies statically linked.

          ### Community

          - [ ] I have tested and left feedback on two other [pull requests][pulls] for new or updating plugins.
          - [ ] I have commented links to my testing report in this PR.

          ## Testing

          - [ ] Tested by a third party on SteamOS Stable or Beta update channel.
          CHECKLIST_EOF
          )
          CHECKLIST="${CHECKLIST/#          /}"
          CHECKLIST="${CHECKLIST//\n          /\n}"

          if [[ "$IS_UPDATE" == "true" ]]; then
            if [[ -d "plugins/${PLUGIN}" ]]; then
              cd "plugins/${PLUGIN}"
              git fetch origin
              git checkout "${COMMIT}"
              cd ../..
            else
              echo "⚠️ Plugin folder plugins/${PLUGIN} not found — adding as new submodule"
              git submodule add "${REPO_URL}.git" "plugins/${PLUGIN}"
              cd "plugins/${PLUGIN}"
              git checkout "${COMMIT}"
              cd ../..
            fi
            COMMIT_MSG="Updating ${PLUGIN} to v${VERSION}"
            PR_TITLE="Update ${PLUGIN} to v${VERSION}"
            {
              echo "# Update ${PLUGIN} to v${VERSION}"
              echo ""
              echo "${CHANGELOG}"
              echo ""
              echo "${CHECKLIST}"
              echo ""
              echo "[pulls]: ${PULLS_URL}"
            } > ../pr_body.md
          else
            git submodule add "${REPO_URL}.git" "plugins/${PLUGIN}"
            cd "plugins/${PLUGIN}"
            git checkout "${COMMIT}"
            cd ../..
            COMMIT_MSG="Submitting New Plugin ${PLUGIN}"
            PR_TITLE="Add ${PLUGIN} to Plugin Store"
            {
              echo "# Add ${PLUGIN} to Plugin Store"
              echo ""
              echo "${DESCRIPTION}"
              echo ""
              echo "${CHECKLIST}"
              echo ""
              echo "[pulls]: ${PULLS_URL}"
            } > ../pr_body.md
          fi

          git add .
          git commit -m "${COMMIT_MSG}"

          # If an open PR already exists in the upstream database for this plugin,
          # and the PR head belongs to our configured fork, don't create/push a
          # new branch on the fork — we'll update the existing PR branch below.
          EXISTING_PR=$(gh pr list \
            --repo SteamDeckHomebrew/decky-plugin-database \
            --state open \
            --json number,headRefName,headRepositoryOwner,body,title \
            --jq ".[] | select(((.body // \"\") | contains(\"plugins/${PLUGIN}\")) or (.title | contains(\"${PLUGIN}\"))) | {number,headRefName,headRepositoryOwner,title} | @base64" 2>/dev/null || true)

          if [[ -n "$EXISTING_PR" ]]; then
            PR_ENTRY=$(echo "$EXISTING_PR" | head -n1)
            PR_HEAD_OWNER=$(echo "$PR_ENTRY" | base64 --decode | jq -r '.headRepositoryOwner')
            PR_HEAD_BRANCH=$(echo "$PR_ENTRY" | base64 --decode | jq -r '.headRefName')
            if [[ "${PR_HEAD_OWNER,,}" == "${FORK%%/*,,}" ]]; then
              echo "Found existing PR from our fork (${PR_HEAD_OWNER}:${PR_HEAD_BRANCH}); skipping push to origin and will update that branch."
              SKIP_PUSH_ORIGIN=true
            else
              SKIP_PUSH_ORIGIN=false
            fi
          else
            SKIP_PUSH_ORIGIN=false
          fi

          if [[ "$SKIP_PUSH_ORIGIN" != "true" ]]; then
            git push -u origin "${BRANCH}" --force
          else
            echo "Not pushing new branch to fork (existing PR will be updated)."
          fi

          # Check if any open PR exists that references this plugin (any head branch)
          # If one exists and the head owner matches our fork, push updates to that branch
          # Otherwise, update the PR title/body to reflect the new version and comment.
          EXISTING_PR=""
          EXISTING_PR=$(gh pr list \
            --repo SteamDeckHomebrew/decky-plugin-database \
            --state open \
            --json number,title,headRefName,headRepositoryOwner,body \
            --jq ".[] | select(((.body // \"\") | contains(\"plugins/${PLUGIN}\")) or (.title | contains(\"${PLUGIN}\"))) | {number,headRefName,headRepositoryOwner,title} | @base64" 2>/dev/null || true)

          if [[ -n "$EXISTING_PR" ]]; then
            # pick the first matching PR
            PR_ENTRY=$(echo "$EXISTING_PR" | head -n1)
            PR_NUMBER=$(echo "$PR_ENTRY" | base64 --decode | jq -r '.number')
            PR_HEAD_BRANCH=$(echo "$PR_ENTRY" | base64 --decode | jq -r '.headRefName')
            PR_HEAD_OWNER=$(echo "$PR_ENTRY" | base64 --decode | jq -r '.headRepositoryOwner')

            echo "Found existing PR #${PR_NUMBER} (head: ${PR_HEAD_OWNER}:${PR_HEAD_BRANCH}) referencing ${PLUGIN}"

            if [[ "${PR_HEAD_OWNER,,}" == "${FORK%%/*,,}" ]]; then
              echo "🔄 Updating existing PR branch ${PR_HEAD_BRANCH} on ${PR_HEAD_OWNER}..."
              # Push the prepared changes into the existing PR branch to update it
              git remote remove target 2>/dev/null || true
              git remote add target "https://x-access-token:${GH_TOKEN}@github.com/${PR_HEAD_OWNER}/decky-plugin-database.git"
              git fetch target main --depth=1
              git checkout -B "${PR_HEAD_BRANCH}" target/main

              # Recreate plugin folder and commit same as earlier
              rm -rf "plugins/${PLUGIN}"
              REPO_URL="https://github.com/${{ github.repository }}"
              git submodule add "$REPO_URL" "plugins/${PLUGIN}" 2>/dev/null || true
              cd "plugins/${PLUGIN}"
              git fetch origin main
              git checkout "${COMMIT}"
              cd ../..

              git add .
              git commit -m "Update ${PLUGIN} to v${VERSION} (commit $COMMIT)" || echo "No changes to commit"
              git push "https://x-access-token:${GH_TOKEN}@github.com/${PR_HEAD_OWNER}/decky-plugin-database.git" "${PR_HEAD_BRANCH}" --force

              echo "✅ PR #${PR_NUMBER} branch updated successfully!"
              # Also update title/body to latest
              gh pr edit "${PR_NUMBER}" \
                --repo SteamDeckHomebrew/decky-plugin-database \
                --title "${PR_TITLE}" \
                --body-file ../pr_body.md || true
            else
              echo "⚠️ Existing PR #${PR_NUMBER} is from ${PR_HEAD_OWNER}; cannot push to that fork. Updating PR title/body instead."
              gh pr edit "${PR_NUMBER}" \
                --repo SteamDeckHomebrew/decky-plugin-database \
                --title "${PR_TITLE}" \
                --body-file ../pr_body.md || true
              gh pr comment "${PR_NUMBER}" --repo SteamDeckHomebrew/decky-plugin-database --body "A new submission is available from ${FORK}. If you want this PR updated with the latest version, please grant push access to the ${FORK%%/*} fork or close this PR so we can open an updated one." || true
              echo "✅ PR #${PR_NUMBER} updated (title/body/comment)."
            fi
          else
            echo "🔗 No existing PR found; creating new PR..."
            gh pr create \
              --repo SteamDeckHomebrew/decky-plugin-database \
              --head "${FORK%%/*}:${BRANCH}" \
              --base main \
              --title "${PR_TITLE}" \
              --body-file ../pr_body.md
            echo ""
            echo "✅ Submission PR created successfully!"
          fi
