name: Post Release (Discord)

on:
  # release:
  #   types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to post (defaults to latest published release)'
        required: false

jobs:
  post-discord:
    name: Post to Discord
    runs-on: ubuntu-latest
    steps:
      - name: Get release info
        run: |
          echo "EVENT_PATH=$GITHUB_EVENT_PATH" >> $GITHUB_ENV

      - name: Post to Discord webhook
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          GITHUB_EVENT_PATH: ${{ env.EVENT_PATH }}
          REPO: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then echo "DISCORD_WEBHOOK_URL not set, skipping"; exit 0; fi
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            if [ -n "$INPUT_TAG" ]; then
              REL_JSON=$(gh api "repos/$REPO/releases/tags/$INPUT_TAG")
            else
              REL_JSON=$(gh api "repos/$REPO/releases/latest")
            fi
            TAG_NAME=$(echo "$REL_JSON" | jq -r '.tag_name // empty')
            NAME=$(echo "$REL_JSON" | jq -r '.name // empty')
            BODY=$(echo "$REL_JSON" | jq -r '.body // empty')
            URL=$(echo "$REL_JSON" | jq -r '.html_url // empty')
            TAG="$TAG_NAME"
          else
            TAG_NAME=$(jq -r '.release.tag_name // empty' "$GITHUB_EVENT_PATH")
            NAME=$(jq -r '.release.name // empty' "$GITHUB_EVENT_PATH")
            BODY=$(jq -r '.release.body // empty' "$GITHUB_EVENT_PATH")
            URL=$(jq -r '.release.html_url // empty' "$GITHUB_EVENT_PATH")
          fi
          RAW_URL="https://raw.githubusercontent.com/$REPO/${TAG:-main}/assets/screenshots/home.png"
          TITLE="$([ -n "$NAME" ] && echo "$NAME" || echo "$TAG_NAME")"
          DESC=$(printf "%s" "$BODY" | tr -d '\r' | head -c 3800)
          DESC="$DESC\n\nReleases: https://github.com/$REPO/releases"

          PAYLOAD=$(jq -n --arg t "$TITLE" --arg d "$DESC" --arg url "$URL" --arg tag "$TAG_NAME" --arg img "$RAW_URL" '
          {
            username: "Release Bot",
            thread_name: $t,
            embeds: [
              {
                title: $t,
                url: $url,
                description: $d,
                footer: { text: $tag },
                image: { url: $img }
              }
            ]
          }')
          curl -s -H "Content-Type: application/json" -d "$PAYLOAD" "$DISCORD_WEBHOOK_URL" || true
