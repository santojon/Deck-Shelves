name: Post Release (Discord + Reddit)

# On every published release (also runnable manually via workflow_dispatch):
#   Discord — auto-posts an embed to a webhook. Secret: DISCORD_WEBHOOK_URL
#             (skips silently if unset, so it never fails a release).
#   Reddit  — does NOT auto-post (Reddit's API now needs pre-approval). Instead
#             it builds a ready-to-post submit link (title + body pre-filled) and
#             writes it to the workflow run's Summary — open it, click, hit Post.
#             Variable (optional): REDDIT_SUBREDDIT (default: DeckShelves).

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to post (defaults to latest published release)'
        required: false

permissions:
  contents: read

jobs:
  post-discord:
    name: Post to Discord
    runs-on: ubuntu-latest
    steps:
      - name: Get release info
        run: |
          echo "EVENT_PATH=$GITHUB_EVENT_PATH" >> $GITHUB_ENV

      - name: Post to Discord webhook
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          GITHUB_EVENT_PATH: ${{ env.EVENT_PATH }}
          REPO: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then echo "DISCORD_WEBHOOK_URL not set, skipping"; exit 0; fi
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            if [ -n "$INPUT_TAG" ]; then
              REL_JSON=$(gh api "repos/$REPO/releases/tags/$INPUT_TAG")
            else
              REL_JSON=$(gh api "repos/$REPO/releases/latest")
            fi
            TAG_NAME=$(echo "$REL_JSON" | jq -r '.tag_name // empty')
            NAME=$(echo "$REL_JSON" | jq -r '.name // empty')
            BODY=$(echo "$REL_JSON" | jq -r '.body // empty')
            URL=$(echo "$REL_JSON" | jq -r '.html_url // empty')
            TAG="$TAG_NAME"
          else
            TAG_NAME=$(jq -r '.release.tag_name // empty' "$GITHUB_EVENT_PATH")
            NAME=$(jq -r '.release.name // empty' "$GITHUB_EVENT_PATH")
            BODY=$(jq -r '.release.body // empty' "$GITHUB_EVENT_PATH")
            URL=$(jq -r '.release.html_url // empty' "$GITHUB_EVENT_PATH")
          fi
          RAW_URL="https://raw.githubusercontent.com/$REPO/${TAG:-main}/assets/screenshots/home.png"
          TITLE="$([ -n "$NAME" ] && echo "$NAME" || echo "$TAG_NAME")"
          DESC=$(printf "%s" "$BODY" | tr -d '\r' | head -c 3800)
          DESC="$DESC\n\nReleases: https://github.com/$REPO/releases"

          PAYLOAD=$(jq -n --arg t "$TITLE" --arg d "$DESC" --arg url "$URL" --arg tag "$TAG_NAME" --arg img "$RAW_URL" '
          {
            username: "Release Bot",
            thread_name: $t,
            embeds: [
              {
                title: $t,
                url: $url,
                description: $d,
                footer: { text: $tag },
                image: { url: $img }
              }
            ]
          }')
          curl -s -H "Content-Type: application/json" -d "$PAYLOAD" "$DISCORD_WEBHOOK_URL" || true

  reddit-link:
    name: Reddit submit link
    runs-on: ubuntu-latest
    steps:
      - name: Build ready-to-post Reddit link
        env:
          REDDIT_SUBREDDIT: ${{ vars.REDDIT_SUBREDDIT }}
          REPO: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
          INPUT_TAG: ${{ github.event.inputs.tag }}
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            if [ -n "$INPUT_TAG" ]; then
              REL_JSON=$(gh api "repos/$REPO/releases/tags/$INPUT_TAG")
            else
              REL_JSON=$(gh api "repos/$REPO/releases/latest")
            fi
            TITLE=$(echo "$REL_JSON" | jq -r '.name // .tag_name // empty')
            BODY=$(echo "$REL_JSON"  | jq -r '.body // empty')
            URL=$(echo "$REL_JSON"   | jq -r '.html_url // empty')
          else
            TITLE=$(jq -r '.release.name // .release.tag_name // empty' "$GITHUB_EVENT_PATH")
            BODY=$(jq -r '.release.body // empty' "$GITHUB_EVENT_PATH")
            URL=$(jq -r '.release.html_url // empty' "$GITHUB_EVENT_PATH")
          fi
          RSUB="${REDDIT_SUBREDDIT:-DeckShelves}"
          # Title + body pre-filled (body trimmed; full notes linked). Reddit's
          # submit page reliably pre-fills `title`; `text` pre-fills the body on
          # most clients — the copy-paste block below is the fallback.
          RTITLE="Deck Shelves $TITLE"
          RBODY=$(printf '%s\n\n---\nFull release notes: %s' "$(printf '%s' "$BODY" | tr -d '\r' | head -c 1500)" "$URL")
          ENC_T=$(jq -rn --arg s "$RTITLE" '$s|@uri')
          ENC_B=$(jq -rn --arg s "$RBODY"  '$s|@uri')
          SUBMIT="https://www.reddit.com/r/$RSUB/submit?title=$ENC_T&text=$ENC_B"
          {
            echo "## 📮 Post this release to r/$RSUB"
            echo ""
            echo "**[→ Open Reddit with the title + body pre-filled]($SUBMIT)** — review and hit *Post*."
            echo ""
            echo "<details><summary>If the body doesn't pre-fill, copy it</summary>"
            echo ""
            echo '```'
            printf '%s\n' "$RBODY"
            echo '```'
            echo ""
            echo "</details>"
          } >> "$GITHUB_STEP_SUMMARY"
          echo "Reddit submit link: $SUBMIT"
