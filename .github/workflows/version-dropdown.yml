name: Refresh version dropdown

# Keeps the bug-report issue template's "Plugin version" dropdown in sync with
# the actual releases. GitHub issue forms only support STATIC options, so we
# regenerate them on every published release (incl. pre-releases) — newest
# first — between the BEGIN/END auto-versions markers in bug_report.yml.

on:
  release:
    types: [published, deleted, released]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        # A release event checks out the tag (detached HEAD), which cannot be
        # pushed. The template lives on the default branch and is independent of
        # the released code, so always operate on the default branch instead.
        # SUBMIT_TOKEN (maintainer PAT) lets the auto-commit push bypass main's
        # branch protection — same pattern as bump.yml / commit-report.sh.
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
          token: ${{ secrets.SUBMIT_TOKEN || github.token }}

      - name: Regenerate version options
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          FILE=".github/ISSUE_TEMPLATE/bug_report.yml"
          # Newest 10 non-draft release tags (incl. pre-releases), strip leading 'v'.
          # Older versions fall under the static "Other / not listed" option below.
          mapfile -t VERS < <(gh api "repos/${{ github.repository }}/releases?per_page=30" \
            --jq '[.[] | select(.draft == false) | .tag_name] | .[:10] | .[]' | sed 's/^v//')
          if [ "${#VERS[@]}" -eq 0 ]; then echo "No releases found — leaving template as-is."; exit 0; fi
          {
            echo "        # BEGIN auto-versions (regenerated by .github/workflows/version-dropdown.yml on each release)"
            for v in "${VERS[@]}"; do echo "        - $v"; done
            echo "        # END auto-versions"
          } > /tmp/block.txt
          awk '
            BEGIN { while ((getline l < "/tmp/block.txt") > 0) block = block l "\n"; close("/tmp/block.txt") }
            /# BEGIN auto-versions/ { printf "%s", block; skip = 1; next }
            /# END auto-versions/ { skip = 0; next }
            !skip
          ' "$FILE" > /tmp/out.yml
          mv /tmp/out.yml "$FILE"
          echo "Regenerated ${#VERS[@]} version option(s)."

      - name: Commit if changed
        run: |
          set -euo pipefail
          if git diff --quiet .github/ISSUE_TEMPLATE/bug_report.yml; then
            echo "No change."; exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/ISSUE_TEMPLATE/bug_report.yml
          git commit -m "chore: refresh issue-template version dropdown [skip ci]"
          git push
