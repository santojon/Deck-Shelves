
name: Update Decky Store PR with Main

on:
  push:
    branches:
      - main

jobs:
  update-decky-store-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.SUBMIT_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Set up git user
        run: |
          git config user.name "Jonathan Santos"
          git config user.email "santojon@users.noreply.github.com"

      - name: Fetch and checkout decky-store branch
        run: |
          git fetch origin decky-store:decky-store || git checkout -b decky-store
          git checkout decky-store || git checkout -b decky-store
          git reset --hard origin/main

      - name: Build and package
        run: |
          pnpm run build:release
          pnpm run dist

      - name: Commit and push update
        env:
          GH_TOKEN: ${{ secrets.SUBMIT_TOKEN }}
        run: |
          git add .
          git commit -m "Atualiza branch decky-store para o último commit da main" || echo "No changes to commit"
          git push origin decky-store --force
