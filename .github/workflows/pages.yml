name: "Ops · Publish site (Pages)"

# Publishes a curated project landing page to GitHub Pages, with the
# validation reports available under /reports and the dashboard linked from
# the footer. The reports are regenerated on demand and copied into the site
# artifact so the public page can expose them without replacing the root page.
#
# ONE-TIME SETUP (REQUIRED): repo Settings → Pages → Build and deployment →
# Source: "GitHub Actions". This must be done by hand — the Actions token
# can't create the Pages site itself (that's an admin operation; `enablement`
# fails with "Resource not accessible by integration"). Once enabled, this
# workflow publishes on every push that touches the site/docs/reports content.
# No secrets, no cost.

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - 'README.md'
      - 'RELEASE_NOTES.md'
      - 'docs/**'
      - 'package.json'
      - 'scripts/site/build_site.py'
      - 'scripts/ci/report.py'
      - 'scripts/ci/report_dashboard.py'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Never run two Pages deploys at once; let an in-flight run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Rebuild report aggregates (index + dashboard)
        run: python3 scripts/ci/report.py --rebuild --root .

      - name: Build project site (release notes, features page, reports)
        run: python3 scripts/site/build_site.py --root .

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload project site as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
