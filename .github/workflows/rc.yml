name: RC → Store Submission

# Fires only AFTER the Release workflow completes successfully. The chain
# guarantees that the version bump + tag + GitHub Release are all in place
# before store.yml builds and submits — otherwise store.yml would race
# bump.yml and publish the OLD version on every rc-labeled PR.
#
# The `rc` label is already enforced upstream in bump.yml; if bump didn't
# run, no tag is pushed, release.yml is never triggered, and this workflow
# is never reached.
on:
  # No `branches:` filter here. Release runs on tag push (`tags: ['v*']`
  # in release.yml), so the `workflow_run` payload's `head_branch` is the
  # tag ref (`v2.3.1` etc.), not `main` — a `branches: [main]` filter
  # silently excludes every release and breaks the chain (rc.yml never
  # fires → store.yml never dispatched). Safety still comes from the
  # `conclusion == 'success'` gate below and from the fact that Release
  # itself only runs on `v*` tags, so any reachable run here is a real
  # version release.
  workflow_run:
    workflows: ["Release"]
    types: [completed]

permissions:
  contents: read
  actions: write

jobs:
  trigger-store:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Decky Store Submission workflow
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          echo "Release workflow #${{ github.event.workflow_run.id }} succeeded — disparando store.yml"
          gh workflow run store.yml \
            --repo "${{ github.repository }}" \
            --ref main
          echo "store.yml triggered on main"
