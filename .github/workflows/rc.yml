name: RC → Store Submission

# Fires only AFTER the Release workflow completes successfully. The chain
# guarantees that the version bump + tag + GitHub Release are all in place
# before store.yml builds and submits — otherwise store.yml would race
# bump.yml and publish the OLD version on every rc-labeled PR.
#
# The `rc` label is already enforced upstream in bump.yml; if bump didn't
# run, no tag is pushed, release.yml is never triggered, and this workflow
# is never reached.
on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]
    branches: [main]

permissions:
  contents: read
  actions: write

jobs:
  trigger-store:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Decky Store Submission workflow
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          echo "Release workflow #${{ github.event.workflow_run.id }} succeeded — disparando store.yml"
          gh workflow run store.yml \
            --repo "${{ github.repository }}" \
            --ref main
          echo "store.yml triggered on main"
