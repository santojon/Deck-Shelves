name: Lint GitHub Actions

on:
  pull_request:
    types: [opened, synchronize, edited, reopened, ready_for_review]
  workflow_dispatch:

jobs:
  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install actionlint binary
        run: |
          set -eux
          ARCH=$(uname -m)
          if [[ "$ARCH" == "x86_64" ]]; then
            ASSET=actionlint_linux_amd64.tar.gz
          elif [[ "$ARCH" == "aarch64" || "$ARCH" == "arm64" ]]; then
            ASSET=actionlint_linux_arm64.tar.gz
          else
            echo "Unsupported architecture: $ARCH" >&2
            exit 1
          fi
          VERSION=v1.7.12
          URL="https://github.com/rhysd/actionlint/releases/download/${VERSION}/${ASSET}"
          echo "Downloading ${URL}"
          curl -sL "$URL" -o /tmp/actionlint.tar.gz
          tar -xzf /tmp/actionlint.tar.gz -C /tmp
          sudo mv /tmp/actionlint /usr/local/bin/actionlint
          sudo chmod +x /usr/local/bin/actionlint

      - name: Run actionlint
        run: |
          set -eux
          /usr/local/bin/actionlint .github/workflows/*.yml || exit 1

      - name: Upload actionlint report
        if: failure()
        run: |
          echo "actionlint failed — check logs above"
