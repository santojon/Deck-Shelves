name: Lint GitHub Actions

on:
  pull_request:
    types: [opened, synchronize, edited, reopened, ready_for_review]
  workflow_dispatch:

jobs:
  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.20'

      - name: Install actionlint
        run: |
          set -eux
          GO111MODULE=on go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.12

      - name: Run actionlint
        run: |
          set -eux
          "${GOPATH}/bin/actionlint" .github/workflows/*.yml || exit 1

      - name: Upload actionlint report
        if: failure()
        run: |
          echo "actionlint failed — check logs above"
