name: Auto-label issues by OS

on:
  issues:
    types: [opened, edited, reopened]

permissions:
  issues: write
  contents: read

jobs:
  label:
    runs-on: ubuntu-latest
    steps:
      - name: Tag OS labels from issue title + body
        uses: actions/github-script@v7
        with:
          script: |
            // All matching is case-insensitive — patterns use the `i` flag
            // and the haystack is also lowercased as a defensive belt-and-
            // suspenders measure (covers patterns built without the flag).
            const title = (context.payload.issue?.title ?? "").toLowerCase();
            const body  = (context.payload.issue?.body  ?? "").toLowerCase();
            const text  = `${title}\n${body}`;

            // Detection order matters: more specific labels must be checked
            // first so they win over broader fallbacks. The SteamOS-beta
            // signal is detected here as a flag — when it fires we apply
            // OS::SteamOS + release::beta instead of a dedicated beta label
            // (kept consistent with the plugin release-channel convention).
            const steamOsBetaPatterns = [
              /\bsteam\s*os\b[\s\S]{0,80}\b(beta|preview|3\.[7-9]\d*\.\d+)\b/i,
              /\b(beta|preview)\b[\s\S]{0,80}\bsteam\s*os\b/i,
            ];
            // Prefer explicit "stable" mention; detect stable and beta
            // independently. Only add a release label when explicitly
            // present; if neither is detected, add no release label.
            const isReleaseStable = /\bstable\b/i.test(text) || /release\s+channel[\s\S]{0,120}\bstable\b/i.test(text);
            const isReleaseBeta = steamOsBetaPatterns.some((p) => p.test(text));

            const buckets = [
              { label: "OS::Bazzite",       patterns: [/\bbazzite\b/i] },
              { label: "OS::Chimera",       patterns: [/\bchimera\s*os\b/i, /\bchimeraos\b/i, /\bchimera\b/i] },
              { label: "OS::MacOS",         patterns: [/\bmac\s*os\b/i, /\bmacos\b/i, /\bdarwin\b/i, /\bosx\b/i] },
              { label: "OS::Windows",       patterns: [/\bwindows\b/i, /\bwin(?:10|11|7|8)\b/i] },
              {
                label: "OS::SteamOS",
                patterns: [
                  /\bsteam\s*os\b/i,
                  /\bsteamos\b/i,
                  /\bsteam\s*deck\s*official\b/i,
                  /\bvalve\s*os\b/i,
                ],
              },
              { label: "OS::OtherHoloISO",  patterns: [/\bholoiso\b/i, /\bholoiso[-_ ]?derived\b/i] },
              // Steam UI mode detection (Deck Shelves supports Game Mode and Big Picture only)
              { label: "mode::BigPicture",  patterns: [/\bbig\s*picture\b/i, /\bbpbm\b/i, /\bbig\s*picture\s*mode\b/i] },
              { label: "mode::GameMode",    patterns: [/\bgame\s*mode\b/i, /\bgamepad\s*ui\b/i, /\bsteam\s*deck\s*(home|ui)\b/i] },
              // Release channel (matched from bug report form dropdown answer)
              { label: "release::beta",   patterns: [/\bbeta\s*[/\/]\s*pre[-\s]?release\b/i, /\bpre[-\s]?release\b/i] },
              { label: "release::stable", patterns: [/release\s+channel[\s\S]{0,120}\bstable\b/i] },
            ];

            const toAdd = new Set();
            for (const { label, patterns } of buckets) {
              for (const p of patterns) {
                const re = p instanceof RegExp ? new RegExp(p.source, p.flags.includes("i") ? p.flags : p.flags + "i") : new RegExp(`\\b${p}\\b`, "i");
                if (re.test(text)) { toAdd.add(label); break; }
              }
            }

            // Release channel: add stable or beta only when explicitly
            // detected. Do not add either label by default.
            if (isReleaseStable && !isReleaseBeta) {
              toAdd.add("release::stable");
            } else if (isReleaseBeta && !isReleaseStable) {
              toAdd.add("release::beta");
            }

            // Fallback: if no specific OS matched but the issue clearly
            // references a Deck/HoloISO-style environment (e.g. "Decky",
            // "homebrew", "GamepadUI") and not Windows/Mac, default to
            // OtherHoloISO so the issue isn't unrouted.
            if (toAdd.size === 0) {
              if (/\bdecky\b|\bgamepad\s*ui\b|\bsteam\s*deck\b|\bhomebrew\b/i.test(text) &&
                  !/\bwindows\b|\bmacos\b|\bmac\s*os\b/i.test(text)) {
                toAdd.add("OS::OtherHoloISO");
              }
            }

            if (toAdd.size === 0) return;

            const current = (context.payload.issue.labels ?? []).map(l => l.name);
            const missing = [...toAdd].filter(l => !current.includes(l));
            if (missing.length === 0) return;

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              labels: missing,
            });
