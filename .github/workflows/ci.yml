name: CI

on:
  push:
    # Skip CI runs whose only changes are the auto-committed report files.
    # Without this every `chore(report): …` commit would re-trigger CI in a loop.
    paths-ignore:
      - 'reports/**'
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

# Need `contents: write` so the report-commit step below can push the
# generated HTML back to the branch (or to the default branch for tag pushes).
permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    runs-on: ubuntu-latest
    # Skip the bump-only commit on main (the auto-commit from bump.yml),
    # but DO run on the matching tag push so the release tag gets its own
    # validation + committed CI report. Without the tag-push exception the
    # report-commit step never fires for release tags.
    if: |
      github.ref_type == 'tag'
      || !startsWith(github.event.head_commit.message, 'chore: bump version')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        # persist-credentials default (true) so the report-commit step can
        # push without re-authenticating. All other steps are read-only.
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      - name: TypeScript check
        run: pnpm run typecheck

      - name: Static validation
        run: node scripts/build/validate.mjs

      - name: Run TypeScript unit tests
        run: pnpm run test

      - name: Setup Python
        run: |
          python3 -m pip install -U pip setuptools
          python3 -m pip install pytest

      - name: Run Python unit tests
        run: python3 -m pytest src/test/ -v

      - name: Build plugin (release mode)
        run: pnpm run build:release

      - name: Package release zip
        run: pnpm run dist

      - name: Run compatibility checks
        run: bash scripts/build/validate-compat.sh

      - name: Upload release zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: deck-shelves-${{ github.sha }}
          path: |
            deck-shelves-v*.zip

      # Triggers for the report:
      #   - commit message contains `#report`
      #   - PR title contains `#report`
      #   - version tag push (`refs/tags/v*`)
      - name: Generate report
        id: report
        if: |
          contains(github.event.head_commit.message, '#report')
          || (github.event.pull_request && contains(github.event.pull_request.title, '#report'))
          || startsWith(github.ref, 'refs/tags/v')
        run: pnpm run validate:ci

      # Refresh the derived aggregates (per-scope `runs-manifest.json`,
      # per-scope `index.html`, top-level `index.html`, `dashboard.html`)
      # against everything currently on disk. The per-run generator only
      # writes `{ts}.{html,json}`; without this step the dashboards stay
      # stale and the new run is invisible until someone rebuilds locally.
      - name: Rebuild aggregates
        if: always() && steps.report.outcome != 'skipped'
        run: pnpm run reports:rebuild

      # Commit the freshly-generated report back to the repo.
      # Skipped on PR runs (no write to a fork's branch) and only fires
      # when the report step itself ran. For tag pushes the commit lands
      # on the repo's default branch (tags themselves are immutable); for
      # branch pushes / workflow_dispatch it lands on the current branch.
      - name: Commit report
        if: |
          always()
          && steps.report.outcome != 'skipped'
          && github.event_name != 'pull_request'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash scripts/ci/commit-report.sh
