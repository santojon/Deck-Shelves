name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      - name: TypeScript check
        run: pnpm run typecheck

      - name: Static validation
        run: node scripts/build/validate.mjs

      - name: Run unit tests (TypeScript)
        run: pnpm run test

      - name: Set up Python and run Python tests
        run: |
          python3 -m pip install -U pip setuptools
          python3 -m pip install pytest
          python3 -m pytest src/test/ -v

      - name: Build plugin (release mode)
        run: pnpm run build:release

      - name: Package release zip
        run: pnpm run dist

      - name: Run compatibility checks
        run: bash scripts/build/validate-compat.sh

      - uses: actions/upload-artifact@v4
        with:
          name: deck-shelves-${{ github.sha }}
          path: |
            deck-shelves-v*.zip
