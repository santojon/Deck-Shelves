name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Generate report
        run: pnpm run validate:ci

      - name: Rebuild aggregates
        if: always()
        run: pnpm run reports:rebuild

      - name: Upload release report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-release-report-${{ github.run_id }}
          path: reports/ci/
          retention-days: 90

      - name: Commit release report
        if: always()
        env:
          # SUBMIT_TOKEN (maintainer PAT) bypasses branch protection on
          # main, so the report can be pushed directly without opening a
          # chore(report) PR that itself has to pass required checks.
          # GITHUB_TOKEN stays exported as a fallback for `gh` if the PR
          # path is still needed (e.g. SUBMIT_TOKEN missing / revoked).
          SUBMIT_TOKEN: ${{ secrets.SUBMIT_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.SUBMIT_TOKEN || secrets.GITHUB_TOKEN }}
        run: bash scripts/ci/commit-report.sh

      - name: Lint (ESLint + Ruff)
        run: |
          python3 -m pip install -U pip
          python3 -m pip install ruff
          pnpm run lint

      - name: Build plugin (release mode)
        run: pnpm run build:release

      - name: Package release zip
        run: pnpm run dist

      - name: Resolve release tag
        id: tag
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            TAG="${GITHUB_REF_NAME}"
          else
            TAG="v$(node -p "require('./package.json').version")"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
          echo "Release tag: ${TAG}"

      - name: Extract release notes for tag
        id: notes
        env:
          VERSION: ${{ steps.tag.outputs.version }}
        run: |
          # Prefer the user-facing RELEASE_NOTES.md; fall back to the
          # technical CHANGELOG.md when a version is missing there.
          NOTES=""
          if [[ -f "RELEASE_NOTES.md" ]]; then
            NOTES=$(awk "/^## \\[${VERSION}\\]/{found=1; next} /^## \\[/{if(found) exit} found{print}" RELEASE_NOTES.md | sed '/^$/N;/^\n$/d')
          fi
          if [[ -z "$NOTES" && -f "CHANGELOG.md" ]]; then
            echo "RELEASE_NOTES.md had no section for ${VERSION} — falling back to CHANGELOG.md"
            NOTES=$(awk "/^## \\[${VERSION}\\]/{found=1; next} /^## \\[/{if(found) exit} found{print}" CHANGELOG.md | sed '/^$/N;/^\n$/d')
          fi
          if [[ -z "$NOTES" ]]; then
            echo "No release notes found for ${VERSION} — generate_release_notes will be used."
          fi
          {
            echo "body<<BODY_EOF"
            printf '%s\n' "$NOTES"
            echo "BODY_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.SUBMIT_TOKEN || github.token }}
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Deck Shelves ${{ steps.tag.outputs.tag }}
          body: ${{ steps.notes.outputs.body }}
          generate_release_notes: ${{ steps.notes.outputs.body == '' }}
          files: |
            deck-shelves-v*.zip
