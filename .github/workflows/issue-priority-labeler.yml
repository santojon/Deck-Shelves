name: Auto-priority labels for issues

on:
  issues:
    types: [opened, edited, reopened, labeled, unlabeled]

permissions:
  issues: write
  contents: read

jobs:
  label:
    runs-on: ubuntu-latest
    steps:
      - name: Compute + apply priority label
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            if (!issue) return;
            const labels = (issue.labels ?? []).map(l => (l.name || "").toLowerCase());
            const has = (...names) => names.some(n => labels.includes(n.toLowerCase()));
            const hasAnyMatching = (rx) => labels.some(l => rx.test(l));

            // Skip when a priority::* is already present (manual override).
            if (hasAnyMatching(/^priority::/)) return;

            // Anything not running on SteamOS is always low priority —
            // SteamOS is the only first-class target. Within SteamOS,
            // bugs are high and enhancements/features/docs are low.
            let priority = null;
            if (!has("os::steamos")) {
              priority = "priority::low";
            } else if (has("type::bug")) {
              priority = "priority::high";
            } else if (has("type::enhancement", "type::feature", "area::docs")) {
              priority = "priority::low";
            }

            if (!priority) return;

            try {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: [priority],
              });
              core.info(`Applied ${priority} to issue #${issue.number}`);
            } catch (e) {
              core.warning(`addLabels failed: ${e?.message ?? e}`);
            }
